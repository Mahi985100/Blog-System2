<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Portal{% endblock %} | ELEGANT.</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <style>
        body { 
            background: #050505;
            min-height: 100vh;
            display: flex;
            margin: 0;
        }
        
        .sidebar-admin {
            width: 280px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
            margin: 20px;
            height: calc(100vh - 40px);
        }
        
        .main-wrapper-admin {
            margin-left: 320px;
            flex: 1;
            padding: 40px 40px 40px 0;
        }
        
        .admin-nav-link {
            color: #cdcdcd; /* Brighter muted color */
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .admin-nav-link:hover, .admin-nav-link.active {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff !important;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.05);
        }
        
        .admin-nav-link.active {
            border-left: 4px solid #ff00cc;
        }
        
        .logout-btn-admin {
            margin-top: auto;
            color: #ff3333;
        }
        
        .logout-btn-admin:hover {
            background: rgba(255, 51, 51, 0.1);
            color: #ff3333;
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

<aside class="sidebar-admin glass p-4 d-flex flex-column animate-fade-in">
    <div class="mb-5 px-2">
        <h3 class="gradient-text fw-bold mb-0">ELEGANT.</h3>
        <small class="text-white-50">Admin Center</small>
    </div>
    
    <nav class="d-flex flex-column gap-2 flex-grow-1">
        <a href="{% url 'admin_dashboard' %}" class="admin-nav-link {% if 'dashboard' in request.path %}active{% endif %}">
            <i class="fas fa-chart-pie"></i> Dashboard
        </a>
        <a href="{% url 'blog_manage' %}" class="admin-nav-link {% if 'manage' in request.path or 'blog' in request.path %}active{% endif %}">
            <i class="fas fa-edit"></i> Manage Stories
        </a>
        <a href="{% url 'home' %}" class="admin-nav-link">
            <i class="fas fa-external-link-alt"></i> Live Site
        </a>
        
        <a href="{% url 'logout' %}" class="admin-nav-link logout-btn-admin mt-auto">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </nav>
</aside>

<main class="main-wrapper-admin animate-fade-in">
    {% block content %}{% endblock %}
</main>

</body>
</html>
